<!DOCTYPE html>
<html>
<head>
    <title>uORFs Visualization</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        #container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #controls {
            padding: 20px;
            flex: none;
        }
        #visualization {
            flex: 1;
            min-height: 0;
            position: relative;
            overflow: auto;
        }
        .input-container {
            margin-bottom: 1rem;
        }
        .input-container form {
            display: flex;
            flex-direction: row;
            gap: 8px;
        }
        .input-container label {
            display: flex;
            gap: 8px;
            align-items: center;
            font-family: sans-serif;
        }
        #details-panel {
            position: fixed;
            right: 20px;
            top: 20px;
            z-index: 1000;
        }
        svg {
            display: block;
            min-width: 800px; /* Minimum width to prevent excessive compression */
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="controls"></div>
        <div id="visualization"></div>
        <div id="details-panel"></div>
    </div>

    <script  type="module" src="{{ url_for('static', filename='main.js') }}">
    </script>

    </script>
</body>
</html>
